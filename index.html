<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — JetRockets</title>
    <meta
      name="description"
      content="Account creation screen built from the JetRockets Frontend Trainee design."
    />

    <!-- Fonts: Poppins 400/600 (matches Figma) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Cascade order: reset -> tokens -> base -> layout -> components -> page -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="auth">
      <!-- Left: brand / hero panel -->
      <aside class="auth__hero">
        <div class="hero__art">
          <div class="hero__images" aria-hidden="true">
            <span class="hero__img hero__img--a"></span>
            <span class="hero__img hero__img--b"></span>
            <span class="hero__img hero__img--c"></span>
          </div>
          <p class="hero__title">
            Social media shared today, tomorrow or by location
          </p>
        </div>
      </aside>

      <!-- Right: account creation form -->
      <main id="main" class="auth__panel">
        <div class="panel">
          <a class="logo" href="#" aria-label="JetRockets home">
            <span class="logo__mark" aria-hidden="true"></span>
            <span class="logo__text">Logo</span>
          </a>

          <header class="panel__head">
            <h1>Create account</h1>
            <p>For business, band or celebrity.</p>
          </header>

          <form class="form" novalidate>
            <div class="form__grid">
              <div class="field">
                <label for="first-name">First name</label>
                <input id="first-name" name="first_name" type="text"
                       autocomplete="given-name" placeholder="First name" />
              </div>

              <div class="field">
                <label for="last-name">Last name</label>
                <input id="last-name" name="last_name" type="text"
                       autocomplete="family-name" placeholder="Last name" />
              </div>

              <div class="field">
                <label for="email">Email or phone number</label>
                <input id="email" name="email" type="text"
                       autocomplete="email" placeholder="bill.sanders@example.com" />
              </div>

              <div class="field">
                <label for="dob">Date of birth (MM/DD/YY)</label>
                <span class="field__control">
                  <input id="dob" name="dob" type="text" inputmode="numeric"
                         placeholder="MM/DD/YY" />
                  <svg class="field__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M7 2v2H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7Zm12 7v10H5V9h14ZM5 6h14v1H5V6Z"/>
                  </svg>
                </span>
              </div>

              <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password"
                       autocomplete="new-password" placeholder="Password" />
              </div>

              <div class="field">
                <label for="confirm">Confirm password</label>
                <input id="confirm" name="password_confirmation" type="password"
                       autocomplete="new-password" placeholder="Confirm password" />
              </div>
            </div>

            <div class="form__row">
              <label class="checkbox">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>
              <a class="link" href="#">Forgot password?</a>
            </div>

            <label class="checkbox">
              <input type="checkbox" name="terms" required />
              <span>I agree to all the Terms and Privacy policy</span>
            </label>

            <div class="form__actions">
              <button class="button button--primary" type="submit">
                Create account
              </button>
              <button class="button button--dark" type="button">
                <span class="button__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.5h6.5c-.3 1.5-1.1 2.7-2.4 3.6v3h3.9c2.3-2.1 3.5-5.2 3.5-8.8Z"/>
                    <path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.9-3c-1.1.7-2.4 1.2-4 1.2-3.1 0-5.7-2.1-6.6-4.9H1.4v3.1C3.4 21.4 7.4 24 12 24Z"/>
                    <path fill="#FBBC05" d="M5.4 14.3c-.2-.7-.4-1.5-.4-2.3s.1-1.6.4-2.3V6.6H1.4C.5 8.2 0 10 0 12s.5 3.8 1.4 5.4l4-3.1Z"/>
                    <path fill="#EA4335" d="M12 4.8c1.8 0 3.3.6 4.6 1.8l3.4-3.4C17.9 1.2 15.2 0 12 0 7.4 0 3.4 2.6 1.4 6.6l4 3.1C6.3 6.9 8.9 4.8 12 4.8Z"/>
                  </svg>
                </span>
                Sign-in with google
              </button>
            </div>
          </form>

          <p class="panel__foot">
            Don't have an account? <a class="link" href="#">Log In</a>
          </p>

          <div class="badges">
            <a class="badge" href="#" aria-label="Get it on Google Play">
              <span class="badge__store">Google Play</span>
            </a>
            <a class="badge" href="#" aria-label="Download on the App Store">
              <span class="badge__store">App Store</span>
            </a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
