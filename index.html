<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — JetRockets</title>
    <meta
      name="description"
      content="Account creation screen built from the JetRockets Frontend Trainee design."
    />
    <link rel="icon" href="assets/images/logo.webp" type="image/webp" />

    <!-- Fonts: Poppins 400/600 (matches Figma) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Cascade order: reset -> tokens -> base -> layout -> components -> page -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />

    <script src="js/main.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="auth">
      <!-- Left: brand / hero panel -->
      <aside class="auth__hero">
        <div class="hero__art">
          <p class="hero__title">
            Social media shared today, tomorrow or by location
          </p>
          <div class="hero__images" aria-hidden="true">
            <img class="hero__img hero__img--side hero__img--left"
                 src="assets/images/hero-a.webp" alt="" loading="lazy" />
            <img class="hero__img hero__img--front"
                 src="assets/images/hero-c.webp" alt="" />
            <img class="hero__img hero__img--side hero__img--right"
                 src="assets/images/hero-b.webp" alt="" loading="lazy" />
          </div>
        </div>
      </aside>

      <!-- Right: account creation form -->
      <main id="main" class="auth__panel">
        <div class="panel">
          <a class="logo" href="#" aria-label="JetRockets home">
            <img class="logo__mark" src="assets/images/logo.webp" alt=""
                 width="42" height="48" />
            <span class="logo__text">Logo</span>
          </a>

          <header class="panel__head">
            <h1>Create account</h1>
            <p>For business, band or celebrity.</p>
          </header>

          <!-- Field names use Rails' nested strong-params convention
               (user[...]); a real Rails controller would receive `params[:user]`
               at POST /users. On this static demo, js/main.js intercepts the
               submit, runs native validation, and shows a notice (no backend). -->
          <form class="form" action="/users" method="post">
            <div class="form__grid">
              <div class="field">
                <label for="first-name">First name</label>
                <input id="first-name" name="user[first_name]" type="text"
                       autocomplete="given-name" required />
              </div>

              <div class="field">
                <label for="last-name">Last name</label>
                <input id="last-name" name="user[last_name]" type="text"
                       autocomplete="family-name" required />
              </div>

              <div class="field">
                <label for="email">Email or phone number</label>
                <input id="email" name="user[email]" type="text"
                       autocomplete="email" required />
              </div>

              <div class="field">
                <label for="dob">Date of birth (MM/DD/YY)</label>
                <span class="field__control">
                  <input id="dob" name="user[date_of_birth]" type="text" inputmode="numeric" />
                  <svg class="field__icon" viewBox="0 0 15 17" aria-hidden="true">
                    <path fill="currentColor" fill-opacity="0.32" d="M3.33333 8.33333H5V10H3.33333V8.33333ZM15 3.33333V15C15 15.442 14.8244 15.866 14.5118 16.1785C14.1993 16.4911 13.7754 16.6667 13.3333 16.6667H1.66667C0.741667 16.6667 0 15.9167 0 15V3.33333C0 2.89131 0.175595 2.46738 0.488155 2.15482C0.800716 1.84226 1.22464 1.66667 1.66667 1.66667H2.5V0H4.16667V1.66667H10.8333V0H12.5V1.66667H13.3333C13.7754 1.66667 14.1993 1.84226 14.5118 2.15482C14.8244 2.46738 15 2.89131 15 3.33333ZM1.66667 5H13.3333V3.33333H1.66667V5ZM13.3333 15V6.66667H1.66667V15H13.3333ZM10 10V8.33333H11.6667V10H10ZM6.66667 10V8.33333H8.33333V10H6.66667ZM3.33333 11.6667H5V13.3333H3.33333V11.6667ZM10 13.3333V11.6667H11.6667V13.3333H10ZM6.66667 13.3333V11.6667H8.33333V13.3333H6.66667Z"/>
                  </svg>
                </span>
              </div>

              <div class="field">
                <label for="password">Password</label>
                <input id="password" name="user[password]" type="password"
                       autocomplete="new-password" required minlength="8" />
              </div>

              <div class="field">
                <label for="confirm">Confirm password</label>
                <input id="confirm" name="user[password_confirmation]" type="password"
                       autocomplete="new-password" required minlength="8" />
              </div>
            </div>

            <div class="form__row">
              <label class="checkbox">
                <input type="checkbox" name="user[remember_me]" />
                <span>Remember me</span>
              </label>
              <a class="link" href="#">Forgot password?</a>
            </div>

            <label class="checkbox">
              <input type="checkbox" name="user[terms_of_service]" required />
              <span>I agree to all the <a class="link" href="#">Terms</a>
                and <a class="link" href="#">Privacy policy</a></span>
            </label>

            <div class="form__actions">
              <button class="button button--primary" type="submit">
                Create account
              </button>
              <button class="button button--dark" type="button">
                <img class="button__icon" src="assets/images/google.webp"
                     alt="" width="20" height="20" />
                Sign-in with google
              </button>
            </div>
          </form>

          <p class="panel__foot">
            Don't have an account? <a class="link" href="#">Log In</a>
          </p>

          <div class="badges">
            <a class="badge" href="#">
              <img src="assets/images/badge-google-play.svg"
                   alt="Get it on Google Play" width="135" height="40" />
            </a>
            <a class="badge" href="#">
              <img src="assets/images/badge-app-store.svg"
                   alt="Download on the App Store" width="135" height="40" />
            </a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
